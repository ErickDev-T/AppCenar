<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/lib/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    
    <title>Registrar comercio</title>
  </head>
  <body>
    <header>
      <nav class="navbar bg-dark border-bottom border-body navbar-expand-lg" data-bs-theme="dark">
        <div class="container-fluid">
          <a class="navbar-brand fw-bold" href="/"><i class="bi bi-bag"></i> BookStore</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="/user/login"><i class="bi bi-box-arrow-in-right"></i> Login</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/user/register"><i class="bi bi-person-plus"></i> Register</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container mt-4">
      <div class="row justify-content-center mt-4">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6">
        <div class="card shadow-sm border rounded-3">

            <div class="card-header bg-success text-white text-center py-2">
                <h1 class="h4 mb-0">
                    <i class="bi bi-shop-window me-2"></i>Registrar comercio
                </h1>
            </div>

            <div class="card-body p-3 p-md-4">
                <p class="text-muted mb-3 small">Completa el formulario para registrar tu comercio</p>

                <div class="alert alert-danger py-2" role="alert">
                    <ul class="mb-0 small">
                        <li>No se pudo completar el registro o enviar el correo de activacion.</li>
                    </ul>
                </div>

                <form action="/user/register-commerce" method="POST" enctype="multipart/form-data" novalidate>
                    <div class="row g-2">

                        <div class="col-12">
                            <label for="nombre" class="form-label mb-1">Nombre del comercio</label>
                            <input id="nombre" name="nombre" type="text" class="form-control"
                                value="Comercio Debug" required />
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="telefono" class="form-label mb-1">Teléfono</label>
                            <input id="telefono" name="telefono" type="text" class="form-control"
                                value="8095551234" placeholder="809-000-0000" required />
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="correo" class="form-label mb-1">Correo</label>
                            <input id="correo" name="correo" type="email" class="form-control"
                                value="debug-4679651f@appcenar.com" required />
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="horaApertura" class="form-label mb-1">Hora de apertura</label>
                            <input id="horaApertura" name="horaApertura" type="time" class="form-control"
                                value="08:00" required />
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="horaCierre" class="form-label mb-1">Hora de cierre</label>
                            <input id="horaCierre" name="horaCierre" type="time" class="form-control"
                                value="17:00" required />
                        </div>

                        <div class="col-12">
                            <label for="tipoComercio" class="form-label mb-1">Tipo de comercio</label>
                            <select id="tipoComercio" name="tipoComercio" class="form-select" required>
                                <option value="">Selecciona un tipo</option>
                                <option value="69d5707213c0b03e69a5da30" selected>Restaurante</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label for="profileImage" class="form-label mb-1">Logo del comercio</label>
                            <input id="profileImage" name="profileImage" type="file" class="form-control" accept="image/*" required />
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="password" class="form-label mb-1">Contraseña</label>
                            <input id="password" name="password" type="password" class="form-control" minlength="8"
                                required />
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="confirmPassword" class="form-label mb-1">Confirmar contraseña</label>
                            <input id="confirmPassword" name="confirmPassword" type="password" class="form-control"
                                minlength="8" required />
                        </div>

                    </div>

                    <div class="my-3"></div>

                    <div class="d-flex justify-content-between gap-2">
                        <a href="/user/login" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-arrow-left me-1"></i>Volver al login
                        </a>
                        <button type="submit" class="btn btn-success btn-sm px-3">
                            <i class="bi bi-floppy me-1"></i>Registrar comercio
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
    </main>
    <script src="/assets/js/lib/bootstrap/bootstrap.bundle.min.js"></script>
    
  </body>
</html>
